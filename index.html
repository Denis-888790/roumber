<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roumber Start Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="home-screen" class="main-wrapper">
        <div class="main-container">
            <div class="logo-section">
                <div class="roumber-logo"><span>R</span></div>
                <h1>ROUMBER</h1>
                <p class="subtitle">of the future</p>
            </div>

            <form class="search-section" id="main-search-form">
                <div class="search-bar">
                    <input type="text" id="main-search-input" placeholder="Спроси ROUMBER о будущем..." autocomplete="off">
                    <button type="submit" class="search-btn">→</button>
                </div>
            </form>

            <div class="shortcuts-section">
                <a href="https://github.com" class="shortcut-btn" target="_blank">GitHub</a>
                <a href="https://youtube.com" class="shortcut-btn" target="_blank">YouTube</a>
                <a href="https://chatgpt.com" class="shortcut-btn" target="_blank">ChatGPT</a>
                <a href="https://google.com" class="shortcut-btn" target="_blank">Google</a>
            </div>

            <div id="history-container" class="history-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

<div id="home-screen" class="main-wrapper">
        </div>

    <div class="clear-history-btn" onclick="clearHistory()">Очистить историю</div>

    <script src="script.js"></script>
</body>

</html>
