<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roumber Start Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        
        <div class="logo-section">
            <div class="roumber-logo"><span>R</span></div>
            <h1>ROUMBER</h1>
            <p class="subtitle">of the future</p>
        </div>

        <form class="search-section" id="search-form">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Спроси ROUMBER о будущем..." autocomplete="off">
                <button type="submit" class="search-btn" id="search-submit">→</button>
            </div>
        </form>

       <div class="shortcuts-section">
            <a href="https://github.com" target="_blank" class="shortcut-btn">GitHub</a>
            <a href="https://youtube.com" target="_blank" class="shortcut-btn">YouTube</a>
            <a href="https://chatgpt.com" target="_blank" class="shortcut-btn">ChatGPT</a>
            <a href="https://google.com" target="_blank" class="shortcut-btn">Google</a>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
